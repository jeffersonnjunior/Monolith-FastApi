services:
  postgres:
    image: postgres:16-alpine
    container_name: monolith-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: monolith
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monolith"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: monolith-api
    environment:
      APP_ENV: docker
      APP_DEBUG: "false"
      APP_LOG_LEVEL: INFO
      APP_API_V1_PREFIX: /api/v1
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/monolith
      DB_ECHO: "false"
      DB_POOL_SIZE: "10"
      DB_MAX_OVERFLOW: "20"
      DB_POOL_TIMEOUT: "30"
      DB_POOL_RECYCLE: "1800"
      DB_POOL_PRE_PING: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
